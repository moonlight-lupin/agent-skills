name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # Install every skill's runtime + dev requirements. Fail fast and report
          # which file broke rather than swallowing the error.
          while IFS= read -r req; do
            echo "::group::pip install -r $req"
            pip install -r "$req" || { echo "::error::failed to install $req"; exit 1; }
            echo "::endgroup::"
          done < <(find . \( -name 'requirements.txt' -o -name 'requirements-dev.txt' \) -not -path './.git/*' | sort)

      - name: Compile all Python files
        run: |
          find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 python -m py_compile

      - name: Run tests
        run: |
          python -m pytest -q --tb=short